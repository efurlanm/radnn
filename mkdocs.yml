# Last edited: 2024-12-21
# This is a work in progress and, so, subject to constant change.
site_name: RADNN
site_author: Eduardo Furlan
#site_url: ""  # offline
site_url:  https://efurlanm.github.io
#site_description: Eduardo Furlan's Page
site_description: RADNN Page
copyright: CC BY 4.0 License

# Repository
repo_name: radnn
repo_url: https://github.com/efurlanm/radnn

# Configuration
docs_dir: src
site_dir: docs
#use_directory_urls: false  # offline
theme:
  name: readthedocs
#plugins: []  # offline
extra_css:
  - docs-assets/extra.css
  # https://squidfunk.github.io/mkdocs-material/reference/math/#katex
  - https://unpkg.com/katex@0/dist/katex.min.css
extra_javascript:
  - docs-assets/katex.js
  - https://unpkg.com/katex@0/dist/katex.min.js
  - https://unpkg.com/katex@0/dist/contrib/auto-render.min.js
markdown_extensions:
  - def_list
  - tables
  - md_in_html
  - pymdownx.arithmatex:
      generic: true    # katex
not_in_nav: |
  docs-assets/
  library-zotero/
exclude_docs: |
  .*
  *§*
  *.F90*
  *.f90*
  *.mod
  *.h
  *.o
  *.nc
  *.py
  *.pyc
  *.npy
  *.sh
  rrtmgp_*
  *.a
  Make*
  *.yml
  *LICENSE*
  *.m
  *.nam
  *.mat
  CONVENTIONS
  *data*
  *.out
  clean
  MODIFICATIONS
  *.cfg
  NOTICE
  TODO
  CHANGELOG
  *variables*
  COPYING
  *.pl
  *.ipynb
  library-zotero/*



# ### NOTES ###
# MKDOCS INSTALL
# pip install --user mkdocs-material mkdocs-jupyter
# MKDOCS.YML EXAMPLE
# https://github.com/squidfunk/mkdocs-material/blob/master/mkdocs.yml
